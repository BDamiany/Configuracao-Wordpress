services:

  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - wp-network

  wordpress1:
    image: wordpress:5.4.2-php7.2-apache
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_AUTH_KEY: 'chave-auth-fixa-1234'
      WORDPRESS_SECURE_AUTH_KEY: 'chave-secure-fixa-1234'
      WORDPRESS_LOGGED_IN_KEY: 'chave-logged-fixa-1234'
      WORDPRESS_NONCE_KEY: 'chave-nonce-fixa-1234'
      WORDPRESS_AUTH_SALT: 'salt-auth-fixa-1234'
      WORDPRESS_SECURE_AUTH_SALT: 'salt-secure-fixa-1234'
      WORDPRESS_LOGGED_IN_SALT: 'salt-logged-fixa-1234'
      WORDPRESS_NONCE_SALT: 'salt-nonce-fixa-1234'
    depends_on:
      - mysql
    networks:
      - wp-network

  wordpress2:
    image: wordpress:5.4.2-php7.2-apache
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_AUTH_KEY: 'chave-auth-fixa-1234'
      WORDPRESS_SECURE_AUTH_KEY: 'chave-secure-fixa-1234'
      WORDPRESS_LOGGED_IN_KEY: 'chave-logged-fixa-1234'
      WORDPRESS_NONCE_KEY: 'chave-nonce-fixa-1234'
      WORDPRESS_AUTH_SALT: 'salt-auth-fixa-1234'
      WORDPRESS_SECURE_AUTH_SALT: 'salt-secure-fixa-1234'
      WORDPRESS_LOGGED_IN_SALT: 'salt-logged-fixa-1234'
      WORDPRESS_NONCE_SALT: 'salt-nonce-fixa-1234'
    depends_on:
      - mysql
    networks:
      - wp-network

  wordpress3:
    image: wordpress:5.4.2-php7.2-apache
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_AUTH_KEY: 'chave-auth-fixa-1234'
      WORDPRESS_SECURE_AUTH_KEY: 'chave-secure-fixa-1234'
      WORDPRESS_LOGGED_IN_KEY: 'chave-logged-fixa-1234'
      WORDPRESS_NONCE_KEY: 'chave-nonce-fixa-1234'
      WORDPRESS_AUTH_SALT: 'salt-auth-fixa-1234'
      WORDPRESS_SECURE_AUTH_SALT: 'salt-secure-fixa-1234'
      WORDPRESS_LOGGED_IN_SALT: 'salt-logged-fixa-1234'
      WORDPRESS_NONCE_SALT: 'salt-nonce-fixa-1234'
    depends_on:
      - mysql
    networks:
      - wp-network

  nginx:
    image: nginx:1.19.0
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wordpress1
      - wordpress2
      - wordpress3
    networks:
      - wp-network

  locust:
    image: locustio/locust
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py
    ports:
      - "8089:8089"
    command: -f /mnt/locust/locustfile.py --host http://nginx
    depends_on:
      - nginx
    networks:
      - wp-network

networks:
  wp-network:
    driver: bridge